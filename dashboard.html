<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBus - Painel do Condutor</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,800;1,900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <header class="driver-header">
        <div class="brand-name">TRACK<span>BUS</span></div>
        <div class="driver-profile">
            <i class="fa-solid fa-circle-user"></i>
            <span id="nome-motorista-header">Condutor</span>
        </div>
    </header>

    <main class="driver-container">
        
                <section class="driver-card">
            <h3><i class="fa-solid fa-route"></i> Sua Linha de Hoje</h3>
            <p class="card-instruction">Esta é a rota definida para você pela Central de Gestão.</p>
            
            <div style="background-color: var(--bg-principal); border: 1px solid var(--borda-sutil); border-radius: 8px; padding: 15px; text-align: center;">
                <span style="color: var(--texto-escuro); font-size: 0.8rem; text-transform: uppercase; font-weight: 600; display: block; margin-bottom: 4px;">Itinerário Designado</span>
                <strong id="texto-rota-atribuida" style="color: var(--azul-eletrico); font-size: 1.1rem; display: block;">Buscando sua rota no sistema...</strong>
            </div>
        </section>

        <div id="controles-jornada" class="disabled-zone">
            
        
            <section class="driver-card">
                <h3><i class="fa-solid fa-signal"></i> Status de Operação</h3>
                <div class="status-btn-grid">
                    <button class="btn-status-toggle" data-status="Em Rota" id="status-em-rota">
                        <i class="fa-solid fa-circle-play"></i> Iniciar / Em Rota
                    </button>
                    <button class="btn-status-toggle" data-status="Atrasado" id="status-atrasado">
                        <i class="fa-solid fa-clock"></i> Reportar Atraso
                    </button>
                    <button class="btn-status-toggle" data-status="Fora de Operação" id="status-concluido">
                        <i class="fa-solid fa-circle-check"></i> Viagem Concluída
                    </button>
                </div>
            </section>

            <section class="driver-card">
                <h3><i class="fa-solid fa-triangle-exclamation"></i> Comunicar Ocorrência</h3>
                <div class="quick-incident-grid">
                    <button class="btn-incident" data-motivo="Trânsito intenso nas vias principais">Trânsito Lento</button>
                    <button class="btn-incident" data-motivo="Problemas mecânicos com o veículo">Problema Mecânico</button>
                    <button class="btn-incident" data-motivo="Aguardando liberação dos passageiros">Aguardando Alunos</button>
                    <button class="btn-incident" data-motivo="Sem ocorrências no trajeto.">Limpar Avisos</button>
                </div>
            </section>

            <section class="driver-card">
                <h3><i class="fa-solid fa-location-crosshairs"></i> Transmissão de Localização</h3>
                <div class="gps-simulator-box">
                    <div class="gps-status-indicator" id="gps-indicator">
                        <span class="ping-radar"></span>
                        <strong id="gps-status-text">Transmissão Desligada</strong>
                    </div>
                    <button id="btn-toggle-gps" class="btn-gps-action">
                        <i class="fa-solid fa-satellite-dish"></i> Ativar Transmissão GPS (Simulado)
                    </button>
                </div>
            </section>
        </div>

        <button id="btn-sair-painel" class="btn-logout-driver">
            <i class="fa-solid fa-right-from-bracket"></i> Encerrar Turno e Sair
        </button>

    </main>

    <script src="dashboard.js"></script>
</body>
</html>
